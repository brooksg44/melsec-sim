name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: sudo apt-get install -y sbcl

      - name: Cache Quicklisp
        id: ql-cache
        uses: actions/cache@v4
        with:
          path: ~/quicklisp
          key: quicklisp-${{ runner.os }}

      - name: Install Quicklisp
        if: steps.ql-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://beta.quicklisp.org/quicklisp.lisp -o /tmp/quicklisp.lisp
          sbcl --noinform \
               --load /tmp/quicklisp.lisp \
               --eval '(quicklisp-quickstart:install)' \
               --eval '(quit)'

      - name: Run tests
        run: |
          sbcl --noinform \
               --load "$HOME/quicklisp/setup.lisp" \
               --load test-sim.lisp \
               --eval '(quit)' 2>&1 | tee test-output.txt
          ! grep -q '\[FAIL\]' test-output.txt
